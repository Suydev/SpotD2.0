<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Console — SpotDL</title>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:#000;color:rgba(255,255,255,.9);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background-image:
      radial-gradient(60% 50% at 50% 0%,rgba(102,224,207,.10),transparent 60%),
      radial-gradient(40% 40% at 80% 100%,rgba(205,255,208,.08),transparent 60%);
  }
  .card{
    width:min(420px,92vw);
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.10);
    border-radius:18px;padding:32px;
    backdrop-filter:blur(10px);
  }
  .mark{
    width:54px;height:54px;border-radius:14px;
    background:linear-gradient(135deg,#CDFFD0,#66E0CF);
    color:#000;font-size:1.7rem;font-weight:800;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 18px;
  }
  h1{font-size:1.35rem;font-weight:800;text-align:center;letter-spacing:-.02em}
  .sub{text-align:center;color:rgba(255,255,255,.5);font-size:.85rem;margin-top:6px}
  form{margin-top:24px;display:flex;flex-direction:column;gap:12px}
  label{font-size:.78rem;color:rgba(255,255,255,.55);letter-spacing:.5px;text-transform:uppercase}
  input{
    width:100%;padding:12px 14px;border-radius:10px;
    background:#0a0a0a;border:1px solid rgba(255,255,255,.12);
    color:#fff;font-size:.95rem;outline:none;
    font-family:'JetBrains Mono','SF Mono',Menlo,monospace;
  }
  input:focus{border-color:#66E0CF;box-shadow:0 0 0 3px rgba(102,224,207,.18)}
  button{
    width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;
    background:#66E0CF;color:#000;font-weight:700;font-size:.95rem;
    transition:transform .1s,filter .15s;
  }
  button:hover{filter:brightness(1.05)}
  button:active{transform:translateY(1px)}
  .err{
    margin-top:10px;padding:10px 12px;border-radius:8px;
    background:rgba(255,69,58,.12);border:1px solid rgba(255,69,58,.3);
    color:#ff6b61;font-size:.85rem;text-align:center;
  }
  .foot{margin-top:18px;text-align:center;font-size:.75rem;color:rgba(255,255,255,.35)}
  .foot a{color:rgba(255,255,255,.5);text-decoration:none}
  .foot a:hover{color:#66E0CF}
</style>
</head>
<body>
<div class="card">
  <div class="mark">⌘</div>
  <h1>Operator console</h1>
  <p class="sub">Restricted area. Enter the access code to continue.</p>
  <form method="POST" action="/admin/login">
    <input type="hidden" name="next" value="{{ next or '/admin' }}">
    <label for="pw">Access code</label>
    <input id="pw" name="password" type="password" autocomplete="off" autofocus
           placeholder="••••••••" inputmode="text">
    <button type="submit">Unlock console</button>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
  </form>
  <div class="foot">
    <a href="/">← Back to app</a>
  </div>
</div>
</body>
</html>
